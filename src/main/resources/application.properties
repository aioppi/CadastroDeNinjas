spring.application.name=CadastroDeNinjas
# Habilita o H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ConfigurašŃo do banco H2
spring.datasource.url=jdbc:h2:file:./data/cadastrodeninjas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configuraš§es o Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

# AtenšŃo com o Flyway + DDL-auto juntos
# Vocŕ tem ddl-auto=update e Flyway ativado ao mesmo tempo ? \
# isso Ú conflito em potencial. O Hibernate tenta alterar o schema por conta prˇpria enquanto o Flyway tenta controlar as migraš§es. O correto Ú:
# spring.jpa.hibernate.ddl-auto=validate
